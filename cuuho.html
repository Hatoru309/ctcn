<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Danh sách yêu cầu cứu hộ cứu nạn">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Danh Sách Yêu Cầu Cứu Hộ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Rescuer-specific styles */
        .requests-section {
            flex: 1;
            padding: 2rem 0;
            width: 100%;
            overflow-x: hidden;
        }

        .requests-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .requests-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--white);
            margin: 0;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: var(--white);
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .refresh-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .request-card {
            background: var(--white);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.2s ease;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .delete-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid rgba(220, 38, 38, 0.3);
            color: #dc2626;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .delete-btn:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #dc2626;
            transform: scale(1.1);
        }

        .delete-btn:active {
            transform: scale(0.95);
        }

        .request-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .request-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--danger-color);
            transition: width 0.3s ease;
        }

        .request-card.status-processing::before {
            background: var(--accent-color);
        }

        .request-card.status-done::before {
            background: var(--success-color);
        }

        .request-card.status-holding::before {
            background: var(--text-secondary);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .request-info {
            flex: 1;
        }

        .request-phone {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .request-time {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .request-status {
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .request-status.pending {
            background: #fee2e2;
            color: #991b1b;
        }

        .request-status.processing {
            background: #fef3c7;
            color: #92400e;
        }

        .request-status.done {
            background: #d1fae5;
            color: #065f46;
        }

        .request-status.holding {
            background: #e2e8f0;
            color: #475569;
        }

        .request-urgency {
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .request-urgency.critical {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #dc2626;
        }

        .request-urgency.high {
            background: #fef3c7;
            color: #92400e;
            border: 2px solid #f59e0b;
        }

        .request-urgency.medium {
            background: #dbeafe;
            color: #1e40af;
            border: 2px solid #3b82f6;
        }

        .request-urgency.low {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }

        .request-message {
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 1rem;
            padding: 0.875rem;
            background: var(--light-bg);
            border-radius: 10px;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .request-location {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
        }

        .request-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-map {
            flex: 1;
            min-width: 140px;
            background: var(--gradient-water);
            color: var(--white);
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-map:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-status {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 2px solid var(--secondary-color);
            background: var(--white);
            color: var(--secondary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .btn-status:hover {
            background: var(--secondary-color);
            color: var(--white);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--white);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .empty-state-text {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .empty-state-subtext {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .loading-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--white);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-selector {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .status-selector button {
            padding: 0.5rem 0.875rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid transparent;
            background: var(--light-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .status-selector button.active {
            background: var(--secondary-color);
            color: var(--white);
            border-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .requests-section {
                padding: 1.5rem 0;
            }

            .requests-title {
                font-size: 1.5rem;
            }

            .request-card {
                padding: 1.25rem;
            }

            .request-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .request-actions {
                flex-direction: column;
            }

            .btn-map,
            .btn-status {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .requests-title {
                font-size: 1.25rem;
            }

            .request-card {
                padding: 1rem;
                border-radius: 12px;
            }

            .request-phone {
                font-size: 1rem;
            }
        }
    </style>
    <script>
        // Check authentication before rendering the page
        const role = sessionStorage.getItem('userRole') || (sessionStorage.getItem('isAdminLoggedIn') === 'true' ? 'admin' : null);
        
        if (role !== 'admin') {
            if (role === 'manager') {
                window.location.replace('thongke.html');
            } else {
                window.location.replace('login.html');
            }
        }
        
        function handleLogout() {
            sessionStorage.removeItem('userRole');
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.replace('login.html');
        }
    </script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div class="logo">
                <h1>🚑 Danh Sách Yêu Cầu Cứu Hộ</h1>
            </div>
            <button onclick="handleLogout()" class="refresh-btn" style="background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.3); color: #ef4444; padding: 0.5rem 1rem; border-radius: 8px;">
                🚪 Đăng Xuất
            </button>
        </div>
    </header>

    <!-- Requests Section -->
    <section class="requests-section">
        <div class="container">
            <div class="requests-header">
                <h2 class="requests-title">Yêu Cầu Cứu Hộ</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="refresh-btn" id="toggleMapBtn" onclick="toggleMapMode()">
                        <span>🗺️</span>
                        <span id="mapBtnText">Bản Đồ</span>
                    </button>
                    <button class="refresh-btn" id="refreshBtn" onclick="loadRequests()">
                        <span>🔄</span>
                        <span>Tải Lại</span>
                    </button>
                </div>
            </div>
            
            <div id="filterSection" style="margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow-md);">
                <div style="display:flex; gap:10px; align-items:center; margin-bottom: 10px;">
                    <input type="text" id="searchInput" placeholder="Tìm theo số điện thoại hoặc tên..." style="flex:1; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;" oninput="applyFilters()">
                    <button class="refresh-btn" type="button" title="Thùng rác" onclick="openTrash()" style="padding: 0.55rem 0.85rem; border-radius: 10px; min-width: 44px; justify-content:center;">
                        🗑️
                    </button>
                </div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="setUrgencyFilter('')" class="filter-btn active" data-urgency="" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #ccc; background: #eee; cursor:pointer;">Tất cả</button>
                    <button onclick="setUrgencyFilter('Critical')" class="filter-btn" data-urgency="Critical" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #dc2626; color: #dc2626; background: #fee2e2; cursor:pointer;">Khẩn cấp</button>
                    <button onclick="setUrgencyFilter('High')" class="filter-btn" data-urgency="High" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #f97316; color: #f97316; background: #ffedd5; cursor:pointer;">Cao</button>
                    <button onclick="setUrgencyFilter('Medium')" class="filter-btn" data-urgency="Medium" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #eab308; color: #eab308; background: #fef9c3; cursor:pointer;">Trung bình</button>
                    <button onclick="setUrgencyFilter('Low')" class="filter-btn" data-urgency="Low" style="padding: 5px 15px; border-radius: 20px; border: 1px solid #22c55e; color: #22c55e; background: #dcfce7; cursor:pointer;">Thấp</button>
                </div>
            </div>

            <div id="rescuerMapContainer" style="display: none; height: 500px; width: 100%; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow-md); z-index: 1;"></div>


            <div id="requestsContainer">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <p>Đang tải danh sách...</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_BASE_URL = 'https://huy3009-api-for-phobert-urgency-model.hf.space/api';
        
        let allReports = [];
        let groupedReports = [];
        let currentSearch = '';
        let currentUrgency = '';
        let rescuerMap = null;
        let markersLayer = null;
        let knownIds = new Set();
        let isMapMode = false;
        let audioCtx = null;
        let deletedIds = new Set();
        let deletedBackup = new Map();

        function loadDeletedIds() {
            try {
                const raw = localStorage.getItem('deletedReportIds');
                const parsed = raw ? JSON.parse(raw) : [];
                if (Array.isArray(parsed)) deletedIds = new Set(parsed.map(String));
            } catch (_) {
                deletedIds = new Set();
            }
        }

        function persistDeletedIds() {
            try {
                localStorage.setItem('deletedReportIds', JSON.stringify(Array.from(deletedIds)));
            } catch (_) {}
        }

        function loadDeletedBackup() {
            try {
                const raw = localStorage.getItem('deletedReportBackup');
                const parsed = raw ? JSON.parse(raw) : {};
                if (parsed && typeof parsed === 'object') {
                    deletedBackup = new Map(Object.entries(parsed));
                } else {
                    deletedBackup = new Map();
                }
            } catch (_) {
                deletedBackup = new Map();
            }
        }

        function persistDeletedBackup() {
            try {
                const obj = Object.fromEntries(deletedBackup.entries());
                localStorage.setItem('deletedReportBackup', JSON.stringify(obj));
            } catch (_) {}
        }

        function ensureTrashUiMounted() {
            if (document.getElementById('trashOverlay')) return;

            const overlay = document.createElement('div');
            overlay.id = 'trashOverlay';
            overlay.style.cssText = [
                'position:fixed',
                'inset:0',
                'background: rgba(15,23,42,0.55), var(--gradient-bg)',
                'background-blend-mode: multiply',
                'display:none',
                'align-items:center',
                'justify-content:center',
                'padding:16px',
                'z-index:9999'
            ].join(';');

            const modal = document.createElement('div');
            modal.style.cssText = [
                'width:min(900px, 100%)',
                'max-height:min(80vh, 720px)',
                'overflow:auto',
                'background: var(--gradient-bg)',
                'border-radius:16px',
                'box-shadow:0 25px 60px rgba(0,0,0,0.35)',
                'padding:16px'
            ].join(';');

            modal.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
                    <div style="font-weight:800; font-size:1.1rem; color:#ffffff;">🗑️ Thùng rác</div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <button id="trashClearBtn" class="refresh-btn" style="padding:0.45rem 0.9rem; border-radius:999px; background:rgba(255,255,255,0.92); color:#0f172a; border-color:rgba(255,255,255,0.7);">Dọn thùng rác</button>
                        <button id="trashCloseBtn" class="refresh-btn" style="padding:0.45rem 0.9rem; border-radius:999px; background:rgba(255,255,255,0.92); color:#0f172a; border-color:rgba(255,255,255,0.7);">Đóng</button>
                    </div>
                </div>
                <div id="trashList"></div>
            `;

            overlay.appendChild(modal);
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closeTrash();
            });

            document.body.appendChild(overlay);

            document.getElementById('trashCloseBtn').addEventListener('click', closeTrash);
            document.getElementById('trashClearBtn').addEventListener('click', () => {
                if (!confirm('Dọn sạch thùng rác? Các thẻ đã xóa sẽ không thể khôi phục trên thiết bị này.')) return;
                deletedIds = new Set();
                deletedBackup = new Map();
                persistDeletedIds();
                persistDeletedBackup();
                renderTrashList();
            });
        }

        function openTrash() {
            ensureTrashUiMounted();
            renderTrashList();
            const overlay = document.getElementById('trashOverlay');
            if (overlay) overlay.style.display = 'flex';
        }

        function closeTrash() {
            const overlay = document.getElementById('trashOverlay');
            if (overlay) overlay.style.display = 'none';
        }

        function renderTrashList() {
            const list = document.getElementById('trashList');
            if (!list) return;

            const items = Array.from(deletedBackup.values())
                .map(v => {
                    try { return typeof v === 'string' ? JSON.parse(v) : v; } catch { return null; }
                })
                .filter(Boolean);

            const normalizeMessageForDisplay = (msg = '') => {
                const text = String(msg ?? '');
                return text
                    .split('\n')
                    .map(line => line.replace(/^\s+/, ''))
                    .join('\n')
                    .trim();
            };

            const extractNameFromMessage = (msg = '') => {
                const text = String(msg ?? '');
                const m = text.match(/^Họ tên:\s*(.*?)\n/m);
                return (m && m[1]) ? m[1].trim() : '';
            };

            const normalizeTrashItem = (item) => {
                const rawMessage = normalizeMessageForDisplay(item.message || '');
                const extractedName = extractNameFromMessage(item.message || '');
                const contactName = (item.contactName && String(item.contactName).trim()) ? String(item.contactName).trim() : extractedName;
                const cleanMessage = rawMessage
                    .replace(/^Họ tên:.*?\n+Tình trạng:\s*/m, '')
                    .trim();

                return {
                    ...item,
                    contactName,
                    message: cleanMessage
                };
            };

            if (items.length === 0) {
                list.innerHTML = `
                    <div style="padding:18px; border-radius:14px; background:rgba(255,255,255,0.92); border:1px solid rgba(255,255,255,0.65); color:#0f172a;">
                        Không có thẻ nào trong thùng rác.
                    </div>
                `;
                return;
            }

            const normalized = items.map(normalizeTrashItem);

            normalized.sort((a, b) => {
                const ta = new Date(a.deletedAt || a.created_at || 0).getTime() || 0;
                const tb = new Date(b.deletedAt || b.created_at || 0).getTime() || 0;
                return tb - ta;
            });

            list.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:12px;">
                    ${normalized.map(item => `
                        <div class="request-card status-${escapeHtml(item.status || 'pending')}" style="padding: 1rem; border-radius: 16px; box-shadow: var(--shadow-lg); margin: 0; animation: none; text-align:left; background: var(--white); border: none; overflow:hidden;">
                            <button class="refresh-btn" title="Khôi phục" aria-label="Khôi phục" style="position:absolute; top:0.75rem; right:0.75rem; width:38px; height:38px; padding:0; border-radius:999px; font-size:1rem; display:flex; align-items:center; justify-content:center;" onclick="restoreDeleted('${String(item.id).replace(/'/g, "\\'")}')">♻️</button>
                            <div class="request-header" style="margin-bottom:0.75rem; gap:0.75rem;">
                                <div class="request-info" style="min-width:0;">
                                    <div class="request-phone" style="font-size:1rem; margin-bottom:0.35rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                        📞 ${escapeHtml(item.phone || 'N/A')} ${item.contactName ? `- 👤 ${escapeHtml(item.contactName)}` : ''}
                                    </div>
                                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
                                        <span class="request-urgency ${(item.urgency || 'Medium').toLowerCase()}" style="margin-top:0; font-size:0.75rem; padding:0.28rem 0.65rem;">
                                            ⚠️ ${escapeHtml(item.urgency || 'Medium')}
                                        </span>
                                        <span class="request-time" style="font-size:0.8rem;">🕒 ${escapeHtml(formatTimeAgo(item.created_at))}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="request-message" style="font-size:0.9rem; padding:0.75rem; margin-bottom:0.75rem; text-align:left; white-space:pre-line; background: var(--light-bg); border: none; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;">
                                ${escapeHtml(item.message || '')}
                            </div>
                            <div class="request-location" style="font-size:0.85rem; margin-bottom:0; padding:0.35rem 0; text-align:left;">
                                📍 ${escapeHtml(item.meta?.address || item.address || `${item.lat ?? ''}${item.lng ? `, ${item.lng}` : ''}` || '')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function restoreDeleted(reportId) {
            const id = String(reportId);
            deletedIds.delete(id);
            deletedBackup.delete(id);
            persistDeletedIds();
            persistDeletedBackup();
            renderTrashList();
            loadRequests();
        }

        function playBeep() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // 880Hz (A5)
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // volume
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2); // play for 0.2s
                
                // play second beep
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // C6
                    gain2.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 250);
            } catch(e) { console.log(e); }
        }

        // Load requests on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadDeletedIds();
            loadDeletedBackup();
            loadRequests();
            // Auto-refresh every 30 seconds
            setInterval(loadRequests, 30000);
        });

        // Load requests from API
        async function loadRequests() {
            const container = document.getElementById('requestsContainer');
            const refreshBtn = document.getElementById('refreshBtn');
            
            refreshBtn.classList.add('loading');
            refreshBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/rescue/list`);
                const data = await response.json();

                if (data.ok && data.reports) {
                    processAndDisplayRequests(data.reports);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⚠️</div>
                            <div class="empty-state-text">Không thể tải danh sách</div>
                            <div class="empty-state-subtext">Vui lòng thử lại sau</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading requests:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Lỗi kết nối</div>
                        <div class="empty-state-subtext">Không thể kết nối đến server</div>
                    </div>
                `;
            } finally {
                refreshBtn.classList.remove('loading');
                refreshBtn.disabled = false;
            }
        }

        // Display requests in the UI
        function processAndDisplayRequests(reports) {
            // Filter out locally-deleted IDs so they never reappear after refresh.
            const filteredByDeleted = (reports || []).filter(r => !deletedIds.has(String(r.id)));
            allReports = filteredByDeleted;
            const container = document.getElementById('requestsContainer');

            if (!filteredByDeleted || filteredByDeleted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">Chưa có yêu cầu nào</div>
                        <div class="empty-state-subtext">Danh sách sẽ được cập nhật khi có yêu cầu mới</div>
                    </div>
                `;
                return;
            }

            // Play beep if there's a new ID
            let hasNew = false;
            filteredByDeleted.forEach(r => {
                if (!knownIds.has(r.id)) {
                    // Only beep if knownIds is not completely empty (i.e. not the first load)
                    if (knownIds.size > 0) {
                        hasNew = true;
                    }
                    knownIds.add(r.id);
                }
            });
            if (hasNew) {
                playBeep();
            }

            // Filter out "done" status
            const pendingReports = filteredByDeleted.filter(r => r.status !== 'done');
            
            // Group by phone number
            const groupedMap = new Map();
            pendingReports.forEach(r => {
                const phone = r.phone || 'N/A';
                
                let contactName = '';
                let cleanMessage = r.message || 'Không có tin nhắn';
                
                const nameMatch = cleanMessage.match(/^Họ tên:\s*(.*?)\n/);
                if (nameMatch && nameMatch[1]) {
                    contactName = nameMatch[1].trim();
                    cleanMessage = cleanMessage.replace(/^Họ tên:.*?\n+Tình trạng:\s*/, '').trim();
                }

                if (!groupedMap.has(phone)) {
                    groupedMap.set(phone, { 
                        ...r, 
                        contactName: contactName, 
                        messages: [cleanMessage],
                        latestTime: new Date(r.created_at).getTime() || 0
                    });
                } else {
                    const existing = groupedMap.get(phone);
                    if (!existing.contactName && contactName) {
                        existing.contactName = contactName;
                    }
                    if (!existing.messages.includes(cleanMessage)) {
                        existing.messages.push(cleanMessage);
                    }
                    
                    const rTime = new Date(r.created_at).getTime() || 0;
                    if (rTime > existing.latestTime) {
                        existing.latestTime = rTime;
                        existing.urgency = r.urgency;
                        existing.created_at = r.created_at;
                    }
                }
            });

            groupedReports = Array.from(groupedMap.values());
            groupedReports.forEach(r => {
                const compactMessages = r.messages.map(m => m.replace(/\s*\n+\s*/g, ' ').trim());
                if (compactMessages.length > 1) {
                    r.message = compactMessages.map(msg => `- ${msg}`).join('\n');
                } else if (compactMessages.length === 1) {
                    r.message = compactMessages[0];
                }
            });

            renderUI();
        }

        function setUrgencyFilter(urgency) {
            currentUrgency = urgency;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const selector = urgency === '' ? '.filter-btn[data-urgency=""]' : `.filter-btn[data-urgency="${urgency}"]`;
            const btn = document.querySelector(selector);
            if(btn) {
                btn.classList.add('active');
                document.querySelectorAll('.filter-btn').forEach(b => b.style.boxShadow = 'none');
                btn.style.boxShadow = '0 0 0 2px var(--secondary-color)';
            }
            renderUI();
        }

        function applyFilters() {
            currentSearch = document.getElementById('searchInput').value.trim().toLowerCase();
            renderUI();
        }

        function toggleMapMode() {
            isMapMode = !isMapMode;
            const btnText = document.getElementById('mapBtnText');
            const mapContainer = document.getElementById('rescuerMapContainer');
            const listContainer = document.getElementById('requestsContainer');

            if (isMapMode) {
                btnText.textContent = 'Danh Sách';
                mapContainer.style.display = 'block';
                listContainer.style.display = 'none';
                renderMap();
                // Play silent audio to unlock AudioContext on first interaction
                playBeep();
            } else {
                btnText.textContent = 'Bản Đồ';
                mapContainer.style.display = 'none';
                listContainer.style.display = 'block';
            }
        }

        function renderUI() {
            // Filter
            let filtered = groupedReports.filter(r => {
                const matchSearch = r.phone.toLowerCase().includes(currentSearch) || 
                                    (r.contactName && r.contactName.toLowerCase().includes(currentSearch));
                const matchUrgency = currentUrgency === '' || r.urgency === currentUrgency;
                return matchSearch && matchUrgency;
            });

            // Sort reports: priority first (critical > high > medium > low)
            const priorityOrder = { 'Critical': 1, 'High': 2, 'Medium': 3, 'Low': 4 };
            filtered = filtered.sort((a, b) => {
                const priorityA = priorityOrder[a.urgency || 'Medium'] || 3;
                const priorityB = priorityOrder[b.urgency || 'Medium'] || 3;
                return priorityA - priorityB;
            });

            // Render List
            const container = document.getElementById('requestsContainer');
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">Không tìm thấy kết quả phù hợp</div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="requests-list">
                        ${filtered.map(report => createRequestCard(report)).join('')}
                    </div>
                `;
            }

            // Render Map if active
            if (isMapMode) {
                renderMap(filtered);
            }
        }

        const colorMap = {
            'Critical': '#dc2626',
            'High': '#f97316',
            'Medium': '#eab308',
            'Low': '#22c55e'
        };

        function renderMap(reportsToRender = null) {
            const data = reportsToRender || groupedReports.filter(r => {
                const matchSearch = r.phone.toLowerCase().includes(currentSearch) || 
                                    (r.contactName && r.contactName.toLowerCase().includes(currentSearch));
                const matchUrgency = currentUrgency === '' || r.urgency === currentUrgency;
                return matchSearch && matchUrgency;
            });

            if (!rescuerMap) {
                rescuerMap = L.map('rescuerMapContainer').setView([16.047079, 108.206230], 6); // Default VN
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(rescuerMap);
                markersLayer = L.layerGroup().addTo(rescuerMap);
            }

            markersLayer.clearLayers();

            const bounds = L.latLngBounds();
            let hasValidCoords = false;

            data.forEach(r => {
                if (r.lat && r.lng) {
                    const color = colorMap[r.urgency || 'Medium'] || '#3b82f6';
                    const markerHtml = `
                        <div style="background-color: ${color}; width: 24px; height: 24px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.5);"></div>
                    `;
                    const customIcon = L.divIcon({
                        html: markerHtml,
                        className: 'custom-leaflet-marker',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    const marker = L.marker([r.lat, r.lng], { icon: customIcon });
                    marker.bindPopup(`
                        <div style="font-family: Inter, sans-serif;">
                            <b>${r.contactName ? escapeHtml(r.contactName) : escapeHtml(r.phone)}</b><br>
                            SĐT: ${escapeHtml(r.phone)}<br>
                            Mức độ: ${escapeHtml(r.urgency || 'Medium')}<br>
                            <button onclick="openInGoogleMaps(${r.lat}, ${r.lng}, '')" style="margin-top:10px; padding:5px 10px; background:var(--secondary-color); color:white; border:none; border-radius:5px; cursor:pointer;">Mở Google Maps</button>
                        </div>
                    `);
                    markersLayer.addLayer(marker);
                    bounds.extend([r.lat, r.lng]);
                    hasValidCoords = true;
                }
            });

            if (hasValidCoords) {
                rescuerMap.fitBounds(bounds, { padding: [50, 50] });
            }
            
            setTimeout(() => {
                rescuerMap.invalidateSize();
            }, 100);
        }

        // Create HTML for a single request card
        function createRequestCard(report) {
            const status = report.status || 'pending';
            const statusText = {
                'pending': 'Chờ xử lý',
                'processing': 'Đang xử lý',
                'done': 'Hoàn thành',
                'holding': 'Tạm hoãn'
            };

            const timeAgo = formatTimeAgo(report.created_at);
            const address = report.meta?.address || `${report.lat}, ${report.lng}`;

            const urgency = report.urgency || 'Medium';
            const urgencyText = {
                'Critical': 'Khẩn cấp',
                'High': 'Cao',
                'Medium': 'Trung bình',
                'Low': 'Thấp'
            };

            return `
                <div class="request-card status-${status}" id="request-${report.id}">
                    <button class="delete-btn" onclick="deleteRequest('${report.id}')" title="Xóa yêu cầu">×</button>
                    <div class="request-header">
                        <div class="request-info">
                            <div class="request-phone">
                                📞 ${report.phone || 'N/A'} ${report.contactName ? `- 👤 ${escapeHtml(report.contactName)}` : ''}
                            </div>
                            <div class="request-time">
                                🕐 ${timeAgo}
                            </div>
                            <div class="request-urgency ${urgency.toLowerCase()}">
                                ⚠️ Mức độ: ${urgencyText[urgency] || urgency}
                            </div>
                        </div>
                        <div class="request-status ${status}">
                            ${statusText[status] || status}
                        </div>
                    </div>
                    <div class="request-message">${escapeHtml(report.message || 'Không có tin nhắn')}</div>
                    <div class="request-location">
                        📍 ${escapeHtml(address)}
                    </div>
                    <div class="request-actions">
                        <button class="btn-map" onclick="openInGoogleMaps(${report.lat}, ${report.lng}, '${escapeHtml(address)}')">
                            🗺️ Mở Google Maps
                        </button>
                        <div class="status-selector">
                            <button class="${status === 'pending' ? 'active' : ''}" onclick="updateStatus('${report.id}', 'pending')">Chờ</button>
                            <button class="${status === 'processing' ? 'active' : ''}" onclick="updateStatus('${report.id}', 'processing')">Xử lý</button>
                            <button class="${status === 'done' ? 'active' : ''}" onclick="updateStatus('${report.id}', 'done')">Xong</button>
                            <button class="${status === 'holding' ? 'active' : ''}" onclick="updateStatus('${report.id}', 'holding')">Hoãn</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Open location in Google Maps
        function openInGoogleMaps(lat, lng, address) {
            // Try to open in Google Maps app first, fallback to web
            const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=&travelmode=driving`;
            
            // For mobile devices, try to open the app
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            if (isMobile) {
                // Try Google Maps app URL
                const appUrl = `comgooglemaps://?daddr=${lat},${lng}&directionsmode=driving`;
                window.location.href = appUrl;
                
                // Fallback to web after a short delay if app doesn't open
                setTimeout(() => {
                    window.open(googleMapsUrl, '_blank');
                }, 500);
            } else {
                // Desktop: open in new tab
                window.open(googleMapsUrl, '_blank');
            }
        }

        // Update request status
        async function updateStatus(reportId, newStatus) {
            const cardElement = document.getElementById(`request-${reportId}`);
            const scrollPosition = window.scrollY;
            
            // Track processing time
            let processingTime = null;
            let processingStartTime = null;
            
            if (newStatus === 'processing') {
                // Lưu thời gian bắt đầu xử lý vào localStorage (cho thiết bị hiện tại)
                processingStartTime = Date.now();
                localStorage.setItem(`processing_start_${reportId}`, processingStartTime.toString());
            } else if (newStatus === 'done') {
                // Tính thời gian xử lý
                const startTime = localStorage.getItem(`processing_start_${reportId}`);
                if (startTime) {
                    processingTime = Date.now() - parseInt(startTime);
                    // Lưu vào localStorage như backup
                    localStorage.setItem(`processing_time_${reportId}`, processingTime.toString());
                    // Xóa thời gian bắt đầu sau khi đã lưu
                    localStorage.removeItem(`processing_start_${reportId}`);
                } else {
                    // Nếu không có start time trong localStorage, có thể đã bị xóa hoặc từ máy khác
                    // Thử lấy từ server nếu có
                    console.log('Không tìm thấy thời gian bắt đầu xử lý trong localStorage');
                }
            }
            
            // Optimistic update: Update UI immediately
            if (cardElement) {
                const statusBadge = cardElement.querySelector('.request-status');
                const statusButtons = cardElement.querySelectorAll('.status-selector button');
                
                // Store old values for rollback
                const oldStatus = cardElement.className;
                const oldStatusBadgeClass = statusBadge ? statusBadge.className : '';
                const oldStatusBadgeText = statusBadge ? statusBadge.textContent : '';
                
                // Update status badge
                const statusText = {
                    'pending': 'Chờ xử lý',
                    'processing': 'Đang xử lý',
                    'done': 'Hoàn thành',
                    'holding': 'Tạm hoãn'
                };
                
                if (statusBadge) {
                    statusBadge.className = `request-status ${newStatus}`;
                    statusBadge.textContent = statusText[newStatus] || newStatus;
                }
                
                // Update card class
                cardElement.className = `request-card status-${newStatus}`;
                
                // Update active button
                statusButtons.forEach(btn => btn.classList.remove('active'));
                const targetButton = Array.from(statusButtons).find(btn => {
                    const btnText = btn.textContent.trim();
                    return (newStatus === 'pending' && btnText === 'Chờ') ||
                           (newStatus === 'processing' && btnText === 'Xử lý') ||
                           (newStatus === 'done' && btnText === 'Xong') ||
                           (newStatus === 'holding' && btnText === 'Hoãn');
                });
                if (targetButton) targetButton.classList.add('active');
                
                // If status is "done", remove the card from the UI
                if (newStatus === 'done') {
                    cardElement.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                    cardElement.style.opacity = '0';
                    cardElement.style.transform = 'scale(0.95)';
                    setTimeout(() => cardElement.remove(), 300);
                }
            }
            
            // Call API in background
            try {
                const requestBody = {
                    id: reportId,
                    status: newStatus
                };
                
                // Gửi thời gian xử lý lên server nếu có
                if (processingTime !== null) {
                    requestBody.processing_time = processingTime;
                    // Cũng thử gửi trong meta field
                    requestBody.meta = {
                        processing_time: processingTime
                    };
                }
                
                // Gửi thời gian bắt đầu xử lý nếu đang chuyển sang processing
                if (processingStartTime !== null) {
                    requestBody.processing_start_time = processingStartTime;
                    if (!requestBody.meta) {
                        requestBody.meta = {};
                    }
                    requestBody.meta.processing_start_time = processingStartTime;
                }
                
                const response = await fetch(`${API_BASE_URL}/rescue/update-status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (!data.ok) {
                    // Rollback on error
                    if (cardElement) {
                        const statusBadge = cardElement.querySelector('.request-status');
                        if (statusBadge) {
                            statusBadge.className = oldStatusBadgeClass;
                            statusBadge.textContent = oldStatusBadgeText;
                        }
                        cardElement.className = oldStatus;
                    }
                    alert('Không thể cập nhật trạng thái: ' + (data.error || 'Lỗi không xác định'));
                    // Reload to sync with server
                    loadRequestsWithoutScroll();
                } else {
                    // Sync with server data (in case of any differences)
                    if (newStatus === 'done') {
                        // Reload to ensure proper sorting
                        loadRequestsWithoutScroll();
                    }
                }
            } catch (error) {
                console.error('Error updating status:', error);
                // Rollback on error
                if (cardElement) {
                    const statusBadge = cardElement.querySelector('.request-status');
                    if (statusBadge) {
                        statusBadge.className = oldStatusBadgeClass;
                        statusBadge.textContent = oldStatusBadgeText;
                    }
                    cardElement.className = oldStatus;
                }
                alert('Lỗi kết nối khi cập nhật trạng thái');
                // Reload to sync with server
                loadRequestsWithoutScroll();
            }
        }

        // Load requests without scrolling
        async function loadRequestsWithoutScroll() {
            const container = document.getElementById('requestsContainer');
            const refreshBtn = document.getElementById('refreshBtn');
            
            refreshBtn.classList.add('loading');
            refreshBtn.disabled = true;

            // Store current scroll position
            const scrollPosition = window.scrollY;

            try {
                const response = await fetch(`${API_BASE_URL}/rescue/list`);
                const data = await response.json();

                if (data.ok && data.reports) {
                    processAndDisplayRequests(data.reports);
                    // Restore scroll position immediately
                    requestAnimationFrame(() => {
                        window.scrollTo(0, scrollPosition);
                    });
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">⚠️</div>
                            <div class="empty-state-text">Không thể tải danh sách</div>
                            <div class="empty-state-subtext">Vui lòng thử lại sau</div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading requests:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Lỗi kết nối</div>
                        <div class="empty-state-subtext">Không thể kết nối đến server</div>
                    </div>
                `;
            } finally {
                refreshBtn.classList.remove('loading');
                refreshBtn.disabled = false;
            }
        }

        // Delete request
        async function deleteRequest(reportId) {
            if (!confirm('Bạn có chắc chắn muốn xóa yêu cầu này?')) {
                return;
            }

            // Persist local delete immediately (works even if API/network fails).
            deletedIds.add(String(reportId));
            persistDeletedIds();
            knownIds.delete(reportId);
            try {
                const idStr = String(reportId);
                const snapshot =
                    allReports.find(r => String(r.id) === idStr) ||
                    groupedReports.find(r => String(r.id) === idStr) ||
                    null;

                if (snapshot) {
                    deletedBackup.set(idStr, JSON.stringify({ ...snapshot, deletedAt: new Date().toISOString() }));
                } else {
                    deletedBackup.set(idStr, JSON.stringify({ id: idStr, deletedAt: new Date().toISOString() }));
                }
                persistDeletedBackup();
            } catch (_) {}

            const cardElement = document.getElementById(`request-${reportId}`);
            if (cardElement) {
                // Add fade out animation
                cardElement.style.opacity = '0';
                cardElement.style.transform = 'translateY(-20px)';
                cardElement.style.transition = 'all 0.3s ease';
                
                setTimeout(() => {
                    cardElement.remove();
                    
                    // Check if list is empty after deletion
                    const container = document.getElementById('requestsContainer');
                    const requestsList = container.querySelector('.requests-list');
                    if (requestsList && requestsList.children.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">📋</div>
                                <div class="empty-state-text">Chưa có yêu cầu nào</div>
                                <div class="empty-state-subtext">Danh sách sẽ được cập nhật khi có yêu cầu mới</div>
                            </div>
                        `;
                    }
                }, 300);
            }

            // Try to delete from API if endpoint exists
            try {
                const response = await fetch(`${API_BASE_URL}/rescue/delete`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: reportId
                    })
                });

                const data = await response.json();
                if (!data.ok) {
                    console.warn('Delete API call failed, but card removed from UI:', data.error);
                }
            } catch (error) {
                // If delete endpoint doesn't exist, just remove from UI
                console.log('Delete endpoint not available, card removed from UI only');
            }
        }

        // Format time ago
        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Không xác định';
            
            const now = new Date();
            const time = new Date(timestamp);
            const diffMs = now - time;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Vừa xong';
            if (diffMins < 60) return `${diffMins} phút trước`;
            if (diffHours < 24) return `${diffHours} giờ trước`;
            if (diffDays < 7) return `${diffDays} ngày trước`;
            
            return time.toLocaleDateString('vi-VN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
