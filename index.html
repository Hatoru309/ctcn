<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Yêu cầu hỗ trợ cứu hộ cứu nạn">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Cứu Hộ Mùa Lũ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>🆘 Cứu Hộ Mùa Lũ</h1>
            </div>
        </div>
    </header>

    <!-- Form Section -->
    <section class="form-section">
        <div class="container">
            <div class="form-wrapper">
                <h2 class="form-title">Yêu Cầu Hỗ Trợ</h2>
                <form class="contact-form" id="contactForm" onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label for="phone">Số Điện Thoại *</label>
                        <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại của bạn" required>
                    </div>
                    <div class="form-group">
                        <label for="contactName">Họ Tên Liên Lạc *</label>
                        <input type="text" id="contactName" name="contactName" placeholder="Nhập họ tên của bạn" required>
                    </div>
                    <div class="form-group">
                        <label>Tình Trạng Nhanh</label>
                        <div class="quick-tags" id="quickTags">
                            <button type="button" class="tag-btn">Có người già/trẻ nhỏ</button>
                            <button type="button" class="tag-btn">Người bị thương</button>
                            <button type="button" class="tag-btn">Nước ngập cao</button>
                            <button type="button" class="tag-btn">Hết lương thực</button>
                            <button type="button" class="tag-btn">Mất điện/nước</button>
                            <button type="button" class="tag-btn">Cứu ngay, có người đang nguy kịch</button>
                            <button type="button" class="tag-btn">Tôi đang mắc kẹt trên mái nhà cần cứu gấp</button>
                            <button type="button" class="tag-btn">Tôi không biết bơi, nước lũ đang đe dọa tính mạng tôi</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="message">Mô Tả Chi Tiết *</label>
                        <textarea id="message" name="message" rows="6" placeholder="Nhập tình trạng hiện tại cần hỗ trợ" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Xác Nhận Vị Trí Của Bạn *</label>
                        <div class="location-status" id="locationStatus" style="margin-bottom: 10px;">
                            <span class="info">Nhấn nút bên dưới để cấp quyền vị trí.</span>
                        </div>
                        <button type="button" id="btnGetLocation" class="btn" style="background: var(--light-bg); color: var(--text-primary); border: 2px solid #ccc; width: 100%; margin-bottom: 15px; font-weight: 600;">📍 Lấy Vị Trí Hiện Tại</button>
                        <div id="mapWrap" style="display:none; margin-bottom: 12px;">
                            <div id="mapHint" style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; text-align:center;">
                                Bạn có thể kéo thả ghim để chỉnh lại vị trí (nếu cần).
                            </div>
                            <div id="map"></div>
                        </div>
                        <input type="hidden" id="latitude" name="latitude">
                        <input type="hidden" id="longitude" name="longitude">
                        <input type="hidden" id="address" name="address">
                    </div>
                    <button type="submit" class="btn btn-primary">Gửi Yêu Cầu</button>
                </form>
            </div>
        </div>
    </section>

    <footer style="text-align: center; padding: 1rem; margin-top: auto;">
        <a href="login.html" style="color: var(--text-secondary); text-decoration: none; opacity: 0.7; font-size: 0.85rem;">🔒 Đăng nhập Admin</a>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
